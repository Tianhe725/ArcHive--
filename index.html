<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ArcHive 知弧</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* 登录框 */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 360px;
  padding: 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  backdrop-filter: blur(16px);
  text-align: center;
  z-index: 10;
}

.logo-img {
  width: 80px;
  height: 80px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.3));
}

.title {
  font-size: 30px;
  font-weight: bold;
  letter-spacing: 2px;
}

.sub {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 25px;
}

.password-box {
  position: relative;
}

.password-box input {
  width: 100%;
  padding: 12px;
  padding-right: 45px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.6);
  color: white;
  outline: none;
  box-sizing: border-box;
}

.toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
}

.footer {
  margin-top: 15px;
  font-size: 8px;
  color: rgba(255,255,255,0.25);
}

/* 手机优化 */
@media (max-width: 480px) {
  .box {
    width: 85%;
  }

  .title {
    font-size: 26px;
  }

  .logo-img {
    width: 70px;
    height: 70px;
  }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="box">
  <img src="ArcHive-logo.png" class="logo-img">
  <div class="title">ArcHive</div>
  <div class="sub">知弧 · Private Access System</div>

  <div class="password-box">
    <input type="password" id="pwd" placeholder="Enter Access Code">
    <span class="toggle" onclick="togglePassword()">👁</span>
  </div>

  <button onclick="login()">ENTER</button>

  <div id="msg"></div>

  <div class="footer">
    ARCHIVE SYSTEM · TIANHE STUDIO · 2026
  </div>
</div>

<script>
const correctPassword = "A7XQ9M3L8P2W6KD";

function login() {
  const input = document.getElementById("pwd").value;
  const msg = document.getElementById("msg");

  if (input === correctPassword) {
    msg.innerText = "ACCESS GRANTED";
    setTimeout(() => window.location.href = "home.html", 700);
  } else {
    msg.innerText = "ACCESS DENIED";
    msg.style.color = "rgba(255,80,80,0.9)";
  }
}

function togglePassword() {
  const pwd = document.getElementById("pwd");
  pwd.type = pwd.type === "password" ? "text" : "password";
}

/* Canvas */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const mouse = { x: null, y: null, radius: 140 };

window.addEventListener("mousemove", e => {
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("touchmove", e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});

let points = [];

for (let i = 0; i < 120; i++) {
  points.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < points.length; i++) {
    let p = points[i];

    if (mouse.x !== null) {
      let dx = p.x - mouse.x;
      let dy = p.y - mouse.y;
      let dist = Math.hypot(dx, dy);

      if (dist < mouse.radius) {
        let force = (mouse.radius - dist) / mouse.radius;
        p.x += dx / dist * force * 4;
        p.y += dy / dist * force * 4;
      }
    }

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fill();

    for (let j = i + 1; j < points.length; j++) {
      let p2 = points[j];
      let dist = Math.hypot(p.x - p2.x, p.y - p2.y);

      if (dist < 140) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
