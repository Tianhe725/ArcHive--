<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArcHive 知弧</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<style>

/* ===== 基础 ===== */

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;

  overscroll-behavior: none;
  touch-action: manipulation;

  -webkit-user-select: none;
  user-select: none;

  -webkit-tap-highlight-color: transparent;
}

body {
  position: fixed;
  inset: 0;
  color: white;
}

/* ===== Canvas ===== */

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ===== 登录框 ===== */

.box {

  position: absolute;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  width: 360px;
  max-width: 86vw;

  padding: 30px;

  z-index: 10;

  text-align: center;

  background: rgba(255,255,255,0.04);

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 18px;

  backdrop-filter: blur(18px);
}

/* ===== Logo ===== */

.logo-img {
  width: 82px;
  height: 82px;
  object-fit: contain;

  margin-bottom: 12px;

  filter:
  drop-shadow(0 0 18px rgba(255,255,255,0.28));
}

/* ===== 标题 ===== */

.title {

  font-size: 30px;

  font-weight: bold;

  letter-spacing: 2px;
}

.sub {

  margin-top: 4px;

  margin-bottom: 24px;

  font-size: 12px;

  color: rgba(255,255,255,0.5);

  letter-spacing: 1px;
}

/* ===== 输入 ===== */

input {

  width: 100%;

  box-sizing: border-box;

  padding: 13px;

  border-radius: 10px;

  outline: none;

  color: white;

  background: rgba(0,0,0,0.6);

  border: 1px solid rgba(255,255,255,0.12);

  font-size: 14px;
}

/* ===== 按钮 ===== */

button {

  width: 100%;

  margin-top: 10px;

  padding: 12px;

  border-radius: 10px;

  border: 1px solid rgba(255,255,255,0.14);

  background: rgba(255,255,255,0.05);

  color: white;

  font-weight: bold;

  cursor: pointer;

  transition: 0.22s;
}

button:hover {

  background: rgba(255,255,255,0.12);

  transform: scale(1.03);
}

/* ===== 信息 ===== */

#msg {

  margin-top: 12px;

  font-size: 13px;

  color: rgba(255,255,255,0.7);

  letter-spacing: 1px;
}

/* ===== Footer ===== */

.footer {

  margin-top: 18px;

  font-size: 7px;

  color: rgba(255,255,255,0.24);

  letter-spacing: 2px;

  text-transform: uppercase;
}

/* ===== 横屏提示 ===== */

#rotateTip {

  display: none;

  position: fixed;

  inset: 0;

  z-index: 99999;

  background: #000;

  color: white;

  justify-content: center;

  align-items: center;

  flex-direction: column;

  text-align: center;

  letter-spacing: 2px;

  font-size: 18px;
}

#rotateTip small {

  margin-top: 12px;

  font-size: 12px;

  color: rgba(255,255,255,0.5);
}

/* 手机竖屏时显示 */

@media screen and (orientation: portrait) {

  #rotateTip {
    display: flex;
  }

  .box {
    display: none;
  }
}

/* 小手机 */

@media screen and (max-width: 480px) {

  .title {
    font-size: 26px;
  }

  .box {
    padding: 24px;
  }
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- 横屏提示 -->

<div id="rotateTip">

  <div>PLEASE ROTATE DEVICE</div>

  <small>ArcHive requires landscape mode</small>

</div>

<!-- 登录 -->

<div class="box">

  <img src="ArcHive-logo.png" class="logo-img">

  <div class="title">ArcHive</div>

  <div class="sub">
    知弧 · Private Access System
  </div>

  <input
  type="password"
  id="pwd"
  placeholder="Enter Access Code">

  <button onclick="togglePwd()">
    SHOW / HIDE PASSWORD
  </button>

  <button onclick="login()">
    ENTER
  </button>

  <div id="msg"></div>

  <div class="footer">
    ARCHIVE SYSTEM · TIANHE STUDIO · 2026
  </div>

</div>

<script>

/* =========================
   🔐 PASSWORD
========================= */

const correctPassword = "A7XQ9M3L8P2W6KD";

function login() {

  const input =
  document.getElementById("pwd").value;

  const msg =
  document.getElementById("msg");

  if (input === correctPassword) {

    msg.innerText = "ACCESS GRANTED";

    msg.style.color = "#ffffff";

    setTimeout(() => {

      window.location.href = "./home.html";

    }, 700);

  } else {

    msg.innerText = "ACCESS DENIED";

    msg.style.color = "rgba(255,80,80,0.95)";
  }
}

/* =========================
   👁 SHOW / HIDE PASSWORD
========================= */

function togglePwd() {

  const input =
  document.getElementById("pwd");

  input.type =
  input.type === "password"
  ? "text"
  : "password";
}

/* =========================
   📱 FULLSCREEN
========================= */

function enterFullscreen() {

  const elem = document.documentElement;

  if (elem.requestFullscreen) {

    elem.requestFullscreen();

  } else if (elem.webkitRequestFullscreen) {

    elem.webkitRequestFullscreen();
  }
}

/* 第一次点击自动全屏 */

document.body.addEventListener("click", () => {

  enterFullscreen();

}, { once: true });

/* =========================
   📱 横屏锁定
========================= */

function lockOrientation() {

  if (
    screen.orientation &&
    screen.orientation.lock
  ) {

    screen.orientation
    .lock("landscape")
    .catch(() => {});
  }
}

window.addEventListener("load", () => {

  lockOrientation();
});

/* =========================
   🌌 CANVAS SYSTEM
========================= */

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

/* 高清适配 */

function resizeCanvas() {

  const dpr =
  window.devicePixelRatio || 1;

  canvas.width =
  window.innerWidth * dpr;

  canvas.height =
  window.innerHeight * dpr;

  canvas.style.width =
  window.innerWidth + "px";

  canvas.style.height =
  window.innerHeight + "px";

  ctx.setTransform(
    dpr,
    0,
    0,
    dpr,
    0,
    0
  );
}

resizeCanvas();

window.addEventListener(
  "resize",
  resizeCanvas
);

/* 微信/手机旋转修复 */

window.addEventListener(
  "orientationchange",
  () => {

    setTimeout(() => {

      resizeCanvas();

    }, 300);
  }
);

/* =========================
   🖱 鼠标避让
========================= */

const mouse = {

  x: null,
  y: null,

  radius: 140
};

window.addEventListener(
  "mousemove",
  (e) => {

    mouse.x = e.x;
    mouse.y = e.y;
  }
);

/* 手机触摸 */

window.addEventListener(
  "touchmove",
  (e) => {

    mouse.x =
    e.touches[0].clientX;

    mouse.y =
    e.touches[0].clientY;

  },
  { passive: true }
);

/* =========================
   🌌 POINTS
========================= */

let points = [];

for (let i = 0; i < 120; i++) {

  points.push({

    x: Math.random() * window.innerWidth,

    y: Math.random() * window.innerHeight,

    vx: (Math.random() - 0.5) * 0.6,

    vy: (Math.random() - 0.5) * 0.6
  });
}

/* =========================
   🎨 DRAW
========================= */

function draw() {

  ctx.clearRect(
    0,
    0,
    window.innerWidth,
    window.innerHeight
  );

  for (let i = 0; i < points.length; i++) {

    let p = points[i];

    /* 鼠标排斥 */

    if (mouse.x !== null) {

      let dx = p.x - mouse.x;

      let dy = p.y - mouse.y;

      let dist =
      Math.hypot(dx, dy);

      if (dist < mouse.radius) {

        let force =
        (mouse.radius - dist)
        / mouse.radius;

        p.x +=
        (dx / dist) * force * 4;

        p.y +=
        (dy / dist) * force * 4;
      }
    }

    p.x += p.vx;
    p.y += p.vy;

    /* 边界 */

    if (
      p.x < 0 ||
      p.x > window.innerWidth
    ) {
      p.vx *= -1;
    }

    if (
      p.y < 0 ||
      p.y > window.innerHeight
    ) {
      p.vy *= -1;
    }

    /* 点 */

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      1.6,
      0,
      Math.PI * 2
    );

    ctx.fillStyle =
    "rgba(255,255,255,0.88)";

    ctx.fill();

    /* 连线 */

    for (let j = i + 1; j < points.length; j++) {

      let p2 = points[j];

      let dist =
      Math.hypot(
        p.x - p2.x,
        p.y - p2.y
      );

      if (dist < 140) {

        ctx.beginPath();

        ctx.strokeStyle =
        "rgba(255,255,255,0.08)";

        ctx.lineWidth = 1;

        ctx.moveTo(p.x, p.y);

        ctx.lineTo(p2.x, p2.y);

        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
