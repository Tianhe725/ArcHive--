<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArcHive 知弧</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* canvas */
#canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* 登录框 */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 360px;
  padding: 30px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  backdrop-filter: blur(16px);
  text-align: center;
  z-index: 10;
}

/* logo */
.logo-img {
  width: 80px;
  height: 80px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.3));
}

.title {
  font-size: 30px;
  font-weight: bold;
  letter-spacing: 2px;
}

.sub {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 25px;
}

/* input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.6);
  color: white;
  outline: none;
}

/* buttons */
button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: rgba(255,255,255,0.12);
  transform: scale(1.03);
}

#msg {
  margin-top: 10px;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}

/* footer */
.footer {
  margin-top: 15px;
  font-size: 8px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}

/* 横屏提示 */
#rotateTip {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 999;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 16px;
  color: white;
}

@media screen and (orientation: portrait) {
  #rotateTip {
    display: flex;
  }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="rotateTip">
PLEASE ROTATE DEVICE
</div>

<div class="box">

  <img src="ArcHive-logo.png" class="logo-img">

  <div class="title">ArcHive</div>
  <div class="sub">知弧 · Private Access System</div>

  <input type="password" id="pwd" placeholder="Enter Access Code">

  <button onclick="togglePwd()">SHOW / HIDE PASSWORD</button>
  <button onclick="login()">ENTER</button>

  <div id="msg"></div>

  <div class="footer">
    ARCHIVE SYSTEM · TIANHE STUDIO · 2026
  </div>

</div>

<script>

/* 🔐 密码 */
const correctPassword = "A7XQ9M3L8P2W6KD";

function login() {
  const input = document.getElementById("pwd").value;
  const msg = document.getElementById("msg");

  if (input === correctPassword) {
    msg.innerText = "ACCESS GRANTED";
    msg.style.color = "#fff";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 700);
  } else {
    msg.innerText = "ACCESS DENIED";
    msg.style.color = "rgba(255,80,80,0.9)";
  }
}

/* 👁 密码显示/隐藏 */
function togglePwd() {
  const input = document.getElementById("pwd");
  input.type = input.type === "password" ? "text" : "password";
}

/* 📱 横屏锁定 */
function lockOrientation() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(() => {});
  }
}

window.addEventListener("load", lockOrientation);

/* 🌌 点阵 + 鼠标避让 */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const mouse = { x: null, y: null, radius: 140 };

window.addEventListener("mousemove", (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});

let points = [];

for (let i = 0; i < 120; i++) {
  points.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < points.length; i++) {
    let p = points[i];

    /* 鼠标排斥 */
    if (mouse.x !== null) {
      let dx = p.x - mouse.x;
      let dy = p.y - mouse.y;
      let dist = Math.hypot(dx, dy);

      if (dist < mouse.radius) {
        let force = (mouse.radius - dist) / mouse.radius;
        p.x += dx / dist * force * 4;
        p.y += dy / dist * force * 4;
      }
    }

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    /* 点 */
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fill();

    /* 连线 */
    for (let j = i + 1; j < points.length; j++) {
      let p2 = points[j];
      let dist = Math.hypot(p.x - p2.x, p.y - p2.y);

      if (dist < 140) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
